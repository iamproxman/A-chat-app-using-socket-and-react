server {
    listen 80;

    # Serve the React app
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # This is for React Router. If a user refreshes the page on /profile,
        # Nginx should send them index.html instead of a 404.
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the backend container
    location /api/ {
        # 'backend' is the name of the service in docker-compose.yml! 
        # Docker's internal DNS automatically resolves this to the backend container's IP.
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy WebSocket connections for Socket.io
    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        
        # These 3 lines are the magic recipe that tells Nginx 
        # to upgrade the HTTP connection to a real-time WebSocket!
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    
}
